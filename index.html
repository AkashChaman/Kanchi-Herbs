<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Kanchi Herbs – Pure Herbal Wellness</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,500&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    /* ── RESET ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden; /* full screen, no scroll on landing */
      font-family: 'Poppins', sans-serif;
    }

    /* ── FULL SCREEN LANDING ── */
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(ellipse at 30% 20%, #F1FBF1 0%, #FAFFF5 45%, #FFFDE7 100%);
      position: relative;
    }

    /* ── FLOATING LEAVES ── */
    .leaves { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
    .lf {
      position: absolute; opacity: 0.09;
      animation: floatLeaf 8s ease-in-out infinite;
      user-select: none;
    }
    .lf1 { font-size: 130px; top: 5%;  left: 2%;  animation-delay: 0s;   }
    .lf2 { font-size: 100px; top: 60%; right: 3%; animation-delay: 2.5s; }
    .lf3 { font-size:  80px; bottom: 8%; left: 10%; animation-delay: 5s; }
    .lf4 { font-size: 110px; top: 20%; right: 15%; animation-delay: 1.5s;}
    .lf5 { font-size:  70px; bottom: 20%; right: 8%; animation-delay: 3.5s;}

    @keyframes floatLeaf {
      0%, 100% { transform: translateY(0)   rotate(0deg);  }
      50%       { transform: translateY(-22px) rotate(10deg); }
    }

    /* ── CENTER CARD ── */
    .card {
      position: relative; z-index: 1;
      text-align: center;
      animation: fadeUp 0.9s ease both;
      padding: 20px;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0);    }
    }

    /* ── LOGO DROP ── */
    .logo-drop {
      display: inline-block;
      margin-bottom: 18px;
      filter: drop-shadow(0 8px 20px rgba(46,125,50,0.25));
      animation: fadeUp 0.9s ease 0.15s both;
    }

    /* ── BRAND NAME ── */
    .brand {
      font-family: 'Playfair Display', serif;
      font-size: clamp(52px, 10vw, 96px);
      font-weight: 700;
      color: #1B5E20;
      line-height: 1;
      letter-spacing: -1px;
      animation: fadeUp 0.9s ease 0.25s both;
    }

    /* ── SUB LABEL ── */
    .sub {
      font-size: 11px;
      letter-spacing: 5px;
      text-transform: uppercase;
      color: #388E3C;
      font-weight: 600;
      margin: 10px 0 6px;
      animation: fadeUp 0.9s ease 0.35s both;
    }

    /* ── TAGLINE ── */
    .tagline {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: clamp(15px, 2vw, 19px);
      color: #66BB6A;
      margin-bottom: 42px;
      animation: fadeUp 0.9s ease 0.45s both;
    }

    /* ── ENTER BUTTON ── */
    .enter-btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: #2E7D32;
      color: #fff;
      border: none;
      padding: 16px 48px;
      border-radius: 50px;
      font-family: 'Poppins', sans-serif;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: 0.5px;
      text-decoration: none;
      box-shadow: 0 10px 30px rgba(46,125,50,0.38);
      transition: all 0.3s ease;
      animation: fadeUp 0.9s ease 0.55s both;
    }
    .enter-btn:hover {
      background: #1B5E20;
      transform: translateY(-3px);
      box-shadow: 0 16px 40px rgba(46,125,50,0.45);
    }
    .enter-btn svg { transition: transform 0.3s; }
    .enter-btn:hover svg { transform: translateX(4px); }

    /* ── BOTTOM TAGSTRIP ── */
    .tagstrip {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: #2E7D32;
      color: rgba(255,255,255,0.9);
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 0;
      padding: 11px 16px;
      z-index: 2;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.3px;
    }
    .tagstrip span {
      padding: 3px 24px;
      border-right: 1px solid rgba(255,255,255,0.3);
    }
    .tagstrip span:last-child { border-right: none; }

    /* ── MOBILE ── */
    @media (max-width: 480px) {
      .lf { display: none; }
      .tagstrip span { padding: 3px 12px; font-size: 11px; }
    }
  </style>
</head>
<body>

  <!-- Floating leaves -->
  <div class="leaves">
    <span class="lf lf1">🌿</span>
    <span class="lf lf2">🍃</span>
    <span class="lf lf3">🌱</span>
    <span class="lf lf4">🌿</span>
    <span class="lf lf5">🍃</span>
  </div>

  <!-- Center card -->
  <div class="card">

    <!-- KH Drop Logo -->
    <div class="logo-drop">
      <svg width="86" height="96" viewBox="0 0 90 100" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- drop body -->
        <path d="M45 4 C45 4 10 42 10 63 C10 83 26 97 45 97 C64 97 80 83 80 63 C80 42 45 4 45 4Z"
              fill="#2E7D32"/>
        <!-- shine -->
        <ellipse cx="33" cy="45" rx="5" ry="9" fill="rgba(255,255,255,0.18)" transform="rotate(-20 33 45)"/>
        <!-- KH text -->
        <text x="19" y="77" font-family="Georgia,serif" font-size="30" font-weight="bold" fill="#FFFFFF">KH</text>
        <!-- leaf -->
        <path d="M42 6 Q57 0 62 11 Q53 15 42 6Z" fill="#81C784"/>
        <line x1="45" y1="6" x2="48" y2="22" stroke="#81C784" stroke-width="2.5" stroke-linecap="round"/>
      </svg>
    </div>

    <h1 class="brand">Kanchi Herbs</h1>
    <p class="sub">Pure Herbal Wellness</p>
    <p class="tagline">Nature's finest, traditionally crafted</p>

    <a href="shop.html" class="enter-btn">
      Enter Website
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
        <path d="M5 12h14M12 5l7 7-7 7"/>
      </svg>
    </a>

  </div>

  <!-- Bottom strip -->
  <div class="tagstrip">
    <span>🌿 100% Natural</span>
    <span>🔬 Lab Tested</span>
    <span>🚚 Free Shipping ₹500+</span>
    <span>📞 +91 90923 61314</span>
  </div>

</body>
</html>
